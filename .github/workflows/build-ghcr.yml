name: Build and Push to GHCR

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: self-hosted

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3
      
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:demo

  kcs-scan:
    needs: build-and-push
    runs-on: self-hosted

    steps:
      - name: Pull KCS scanner
        run: docker pull repo.kcs.kaspersky.com/images/scanner:v2.0.0-with-db

      - name: Scan image with KCS
        run: |
          docker run --rm \
            -e API_TOKEN='${{ secrets.KCS_API_TOKEN }}' \
            -e API_BASE_URL='http://kcs.local' \
            -e COMPANY_EXT_REGISTRY_USERNAME='borasevin' \
            -e COMPANY_EXT_REGISTRY_PASSWORD='${{ secrets.GHCR_PAT }}' \
            repo.kcs.kaspersky.com/images/scanner:v2.0.0-with-db \
            /bin/sh /entrypoint.sh ghcr.io/borasevin/kcs-ghcr-demo:demo --stdout
